<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="orb" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#00f3ff"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ff00ff"/>
    </radialGradient>
    <filter id="glow-c">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-m">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fondo negro con esquinas redondeadas -->
  <rect width="512" height="512" fill="#050505" rx="80"/>

  <!-- Rombo magenta -->
  <rect x="116" y="116" width="280" height="280" rx="16"
    fill="none" stroke="#ff00ff" stroke-width="10"
    transform="rotate(45 256 256)" opacity="0.85" filter="url(#glow-m)"/>

  <!-- Círculo cyan -->
  <circle cx="256" cy="256" r="130"
    fill="none" stroke="#00f3ff" stroke-width="7"
    opacity="0.9" filter="url(#glow-c)"/>

  <!-- Esfera central -->
  <circle cx="256" cy="256" r="78" fill="url(#orb)"
    style="filter: drop-shadow(0 0 20px #00f3ff)"/>

  <!-- Líneas de circuito -->
  <line x1="190" y1="256" x2="322" y2="256" stroke="white" stroke-width="2"/>
  <line x1="256" y1="190" x2="256" y2="322" stroke="white" stroke-width="2"/>
  <line x1="211" y1="211" x2="301" y2="301" stroke="white" stroke-width="2"/>
  <line x1="301" y1="211" x2="211" y2="301" stroke="white" stroke-width="2"/>

  <!-- Punto central -->
  <circle cx="256" cy="256" r="10" fill="white"/>

  <!-- Puntos extremos cyan -->
  <circle cx="211" cy="211" r="6" fill="#00f3ff"/>
  <circle cx="301" cy="301" r="6" fill="#00f3ff"/>

  <!-- Puntos extremos magenta -->
  <circle cx="301" cy="211" r="6" fill="#ff00ff"/>
  <circle cx="211" cy="301" r="6" fill="#ff00ff"/>

  <!-- Texto FORGE -->
  <text x="256" y="468" text-anchor="middle"
    font-family="Arial Black, sans-serif" font-weight="900"
    font-size="48" fill="#00f3ff" letter-spacing="10"
    style="filter: drop-shadow(0 0 8px #00f3ff)">FORGE</text>
</svg>
